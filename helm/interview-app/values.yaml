# This file contains the default values for the AI Mock Interview App Helm chart.

# Add your tumid here (Required: set via --set tumid=<id>)
tumid: ""

# Target namespace (Required: set via --set namespace=<name>)
namespace: ""

# Global image configuration to avoid hardcoding
# githubUsername (Required: set via --set githubUsername=<name>)
githubUsername: "" 

image:
  registry: ghcr.io
  githubUsername: ""
  project: ai-mock-interview-platform
  tag: latest
  pullPolicy: Always

# Image Pull Secrets for GHCR
imagePullSecrets:
  - name: ghcr-secret

# Server configuration
server:
  image:
    tag: "" # Overrides global tag if set
    pullPolicy: "" # Overrides global pullPolicy if set
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  replicaCount: 1
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "200m"
      memory: "256Mi"
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: docker
    - name: DB_HOST
      value: "db"
    - name: DB_PORT
      value: "5432"
    - name: DB_NAME
      value: "interview_db"

# Database configuration (Credentials should be in a Secret)
database:
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  name: "interview_db"
  storageSize: "1Gi"
  existingSecret: "interview-db-secrets"
  replicaCount: 1
  service:
    port: 5432
    targetPort: 5432
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "200m"
      memory: "256Mi"

# Client configuration
client:
  image:
    tag: "" # Overrides global tag if set
    pullPolicy: "" # Overrides global pullPolicy if set
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
  replicaCount: 1
  resources:
    limits:
      cpu: "500m"
      memory: "256Mi"
    requests:
      cpu: "50m"
      memory: "50Mi"

# GenAI configuration
genai:
  image:
    tag: "" # Overrides global tag if set
    pullPolicy: "" # Overrides global pullPolicy if set
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
  replicaCount: 1
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "200m"
      memory: "256Mi"
  backend: "gemini"
  model: "gemini-flash-lite-latest"
  localModelUrl: "http://localhost:11434/api/generate"
  existingSecret: "genai-secrets"
  serviceUrl: "http://genai:8000"

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  tls: true
  tlsSecretName: "ai-mock-interview-tls"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  host: "" # Leave empty to use the dynamic host from helpers

# Monitoring configuration
monitoring:
  prometheus:
    enabled: true
    image:
      repository: prom/prometheus
      tag: latest
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 9090
      targetPort: 9090
    scrapeInterval: 15s
    alertFor: 30s
    retention: 2h
    resources:
      limits:
        cpu: "300m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"

  grafana:
    enabled: true
    image:
      repository: grafana/grafana
      tag: latest
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 3000
      targetPort: 3000
    existingSecret: grafana-secrets
    adminUserKey: admin-user
    adminPasswordKey: admin-password
    resources:
      limits:
        cpu: "500m"
        memory: "512Mi"
      requests:
        cpu: "100m"
        memory: "256Mi"
