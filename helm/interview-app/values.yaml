# This file contains the default values for the AI Mock Interview App Helm chart.

# Add your tumid here
tumid: ""

# Target namespace (e.g. <tum-id>-devops26)
namespace: ""

# Image Pull Secrets for GHCR
imagePullSecrets:
  - name: ghcr-secret

# Server configuration
server:
  image:
    repository: ghcr.io/devops26hn/ai-mock-interview-platform/server
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  replicaCount: 1
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "200m"
      memory: "256Mi"
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: docker
    - name: DB_HOST
      value: "db"
    - name: DB_PORT
      value: "5432"
    - name: DB_NAME
      value: "interview_db"

# Database configuration (Credentials should be in a Secret)
database:
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  name: "interview_db"
  storageSize: "1Gi"
  existingSecret: "interview-db-secrets"
  replicaCount: 1
  service:
    port: 5432
    targetPort: 5432
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "200m"
      memory: "256Mi"

# Client configuration
client:
  image:
    repository: ghcr.io/devops26hn/ai-mock-interview-platform/client
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
  replicaCount: 1
  resources:
    limits:
      cpu: "500m"
      memory: "256Mi"
    requests:
      cpu: "50m"
      memory: "50Mi"

# GenAI configuration
genai:
  image:
    repository: ghcr.io/devops26hn/ai-mock-interview-platform/genai
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
  replicaCount: 1
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "200m"
      memory: "256Mi"
  backend: "gemini"
  existingSecret: "genai-secrets"
  serviceUrl: "http://genai:8000"

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  tls: true
  tlsSecretName: "ai-mock-interview-tls"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  host: "" # Leave empty to use the dynamic host from helpers
