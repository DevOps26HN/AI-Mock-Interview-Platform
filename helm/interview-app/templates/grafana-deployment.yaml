{{- if .Values.monitoring.grafana.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: "{{ .Values.monitoring.grafana.image.repository }}:{{ .Values.monitoring.grafana.image.tag }}"
          imagePullPolicy: {{ .Values.monitoring.grafana.image.pullPolicy }}
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.monitoring.grafana.existingSecret }}
                  key: {{ .Values.monitoring.grafana.adminUserKey }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.monitoring.grafana.existingSecret }}
                  key: {{ .Values.monitoring.grafana.adminPasswordKey }}
          volumeMounts:
            - name: grafana-datasource
              mountPath: /etc/grafana/provisioning/datasources/prometheus-datasource.yml
              subPath: prometheus-datasource.yml
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
            - name: grafana-dashboard
              mountPath: /var/lib/grafana/dashboards/interview-platform-observability.json
              subPath: interview-platform-observability.json
          resources:
{{ toYaml .Values.monitoring.grafana.resources | indent 12 }}
      volumes:
        - name: grafana-datasource
          configMap:
            name: grafana-config
            items:
              - key: prometheus-datasource.yml
                path: prometheus-datasource.yml
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-config
            items:
              - key: dashboards.yml
                path: dashboards.yml
        - name: grafana-dashboard
          configMap:
            name: grafana-dashboard
            items:
              - key: interview-platform-observability.json
                path: interview-platform-observability.json
{{- end }}