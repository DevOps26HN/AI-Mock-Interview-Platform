{{- include "interview-app.validateTUMID" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: client-nginx-config
  namespace: {{ include "interview-app.namespace" . }}
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://server-service:{{ .Values.server.service.port }}/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: genai-code
  namespace: {{ include "interview-app.namespace" . }}
data:
  main.py: |
{{ .Values.genaiCode | indent 4 }}

