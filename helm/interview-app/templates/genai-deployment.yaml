apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "interview-app.fullname" . }}-genai
  labels:
    {{- include "interview-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: genai
spec:
  replicas: {{ .Values.genai.replicaCount }}
  selector:
    matchLabels:
      {{- include "interview-app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: genai
  template:
    metadata:
      labels:
        {{- include "interview-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: genai
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: genai
          image: "{{ include "interview-app.imageRepository" (list . "genai") }}:{{ .Values.genai.image.tag | default .Values.image.tag }}"
          imagePullPolicy: {{ .Values.genai.image.pullPolicy | default .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.genai.service.targetPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: GENAI_BACKEND
              value: {{ .Values.genai.backend | quote }}
            - name: GEMINI_MODEL
              value: {{ .Values.genai.model | default "gemini-1.5-flash" | quote }}
            - name: LOCAL_MODEL_URL
              value: {{ .Values.genai.localModelUrl | quote }}
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.genai.existingSecret }}
                  key: GEMINI_API_KEY
          resources:
            {{- toYaml .Values.genai.resources | nindent 12 }}
