services:
  db:
    image: postgres:16
    container_name: interview-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-interview_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  genai:
    build:
      context: ./genai
      dockerfile: Dockerfile
    container_name: interview-genai
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GENAI_BACKEND: ${GENAI_BACKEND:-local}
      LOCAL_MODEL_URL: ${LOCAL_MODEL_URL:-http://localhost:11434/api/generate}
    networks:
      - app-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: interview-server
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-interview_db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      GENAI_SERVICE_URL: ${GENAI_SERVICE_URL:-http://genai:8000}
    ports:
      - "8080:8080"
    depends_on:
      - db
      - genai
    networks:
      - app-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: interview-client
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:latest
    container_name: interview-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - server
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: interview-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
