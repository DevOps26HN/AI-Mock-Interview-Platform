global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "server"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "server:8080"

  - job_name: "genai"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "genai:8000"